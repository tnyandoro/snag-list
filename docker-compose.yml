# infra/docker/docker-compose.yml
version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: property_admin
      POSTGRES_PASSWORD: secure_password_123
      POSTGRES_DB: property_platform
    ports:
      - "5432:5432"
    volumes:
      - property-db-data:/var/lib/postgresql/data
      - ../../server/src/database/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U property_admin"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

volumes:
  property-db-data:
  redis-data: